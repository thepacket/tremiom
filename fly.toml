# fly.toml — Tremiom on fly.io
#
# Deploy with:   fly deploy
# First time:    fly apps create tremiom && fly deploy
#
# See https://fly.io/docs/reference/configuration/ for the schema.

app = 'tremiom'
primary_region = 'yyz'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

# obspy + numpy + scipy + matplotlib hold roughly 350 MB of RSS once a
# SeedLink connection is warm, the per-channel ring buffers fill, and
# TauP travel-time tables are loaded. The peak driver is the **drum
# backfill**: when a Drum group with N stations starts, the worker
# kicks off N concurrent 24 h FDSN fetches; each one briefly holds
# ~100–200 MB of decoded samples in ObsPy. With 6 stations that
# spikes past 1 GB and the VM OOMs (observed 2026-05-31). 2 GB gives
# room for 6+ concurrent backfills plus the event_fetch one-shots.
[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
