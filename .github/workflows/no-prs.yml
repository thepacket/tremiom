name: Auto-close pull requests

# tremiom is a solo-authored project and does not accept pull requests.
# This workflow politely closes any PR that's opened against the repo
# and points the author at Issues / Discussions instead.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  issues: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Comment, close, and lock
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = context.payload.pull_request.number;
            const body = [
              "Thanks for your interest in tremiom!",
              "",
              "tremiom is a solo-authored project and **does not accept pull requests** — the codebase changes upstream based on the maintainer's direction.",
              "",
              "If you'd like to report a bug, share a use-case, or suggest a feature, please open an [issue](../../issues) or start a [discussion](../../discussions) instead. You're of course welcome to fork tremiom and develop your own changes in your fork — that's why it's open-source.",
              "",
              "Closing this PR; see the README's *Contributing* section for context.",
            ].join("\n");
            await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
            await github.rest.pulls.update({ owner, repo, pull_number: number, state: "closed" });
            await github.rest.issues.lock({ owner, repo, issue_number: number, lock_reason: "resolved" });
